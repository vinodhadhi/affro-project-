version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: afforo_postgres
    environment:
      POSTGRES_DB: afforo
      POSTGRES_USER: afforo
      POSTGRES_PASSWORD: afforo_password
      POSTGRES_HOST_AUTHENTICATION_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afforo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: afforo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django API Server
  web:
    build: .
    container_name: afforo_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 project.wsgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgresql://afforo:afforo_password@db:5432/afforo
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - afforo_network

  # Celery Worker
  celery:
    build: .
    container_name: afforo_celery
    command: celery -A project worker -l info
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://afforo:afforo_password@db:5432/afforo
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - afforo_network

  # Celery Beat (Optional - for scheduled tasks)
  celery_beat:
    build: .
    container_name: afforo_celery_beat
    command: celery -A project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DEBUG: "False"
      DATABASE_URL: postgresql://afforo:afforo_password@db:5432/afforo
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - web
    networks:
      - afforo_network

volumes:
  postgres_data:
  redis_data:

networks:
  afforo_network:
    driver: bridge
